<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/deposit.css">

    <title>Depósito - Alke Wallet</title>
</head>

<body>

<!-- NAVBAR -->
<header>
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container-fluid">

            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="./img/icono-billetera.png" width="30" height="30">
                <span class="brand-text">
                    <strong>Alke</strong> Wallet
                </span>
            </a>

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="menu.html">← Volver al menú principal</a>
            </div>

        </div>
    </nav>
</header>

<!-- MAIN -->
<main class="container py-5">

    <div class="deposit-card">

        <div class="row align-items-center">

            <!-- IZQUIERDA (ILUSTRACIÓN) -->
            <div class="col-md-5 text-center">
                <img src="./img/img-alcancía.png" alt="Depósito" class="img-fluid deposit-img">
            </div>

            <!-- DERECHA (FORMULARIO) -->
            <div class="col-md-7">

                <h2 class="hero-title mb-3">
                    Deposita a tu cuenta
                </h2>

                <p class="text-muted mb-4">
                    Ingresa el monto y selecciona el tipo de depósito.
                </p>

                <!-- FORM -->
                <form>

                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Monto</label>
                            <input type="number" class="form-control" placeholder="$ 0">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Tipo de depósito</label>
                            <select class="form-select">
                                <option>Selecciona una opción</option>
                                <option>Transferencia</option>
                                <option>Efectivo</option>
                                <option>Depósito bancario</option>
                            </select>
                        </div>

                    </div>

                    <button type="button" class="btn hero-btn w-100 mt-4">
                        🧾 Realizar depósito
                    </button>

                </form>

            </div>

        </div>

    </div>

</main>

<!-- FOOTER -->
<footer class="custom-footer">
    <p>&copy; 2026 Alke Wallet</p>
</footer>

<script src="./js/jquery-4.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
