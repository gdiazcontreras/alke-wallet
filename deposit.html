<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/deposit.css">
    <title>Pantalla de depósito Alke Wallet</title>
</head>

<body>
    <!-- Encabezado del sitio -->
    <header>
        <h1>Alke Wallet</h1>
    </header>

    <!-- Contenido principal -->
    <main>
        <h2>Deposita a tu cuenta</h2>
        <p>Ingresa el monto y selecciona el tipo de depósito que deseas realizar.</p>

        <form>
            <div>
                <label for="monto">Monto:</label>
                <input type="number" id="monto" min="1" step="1" title="El monto debe ser mayor a cero" required>
            </div>

            <div>
                <label for="tipo">Tipo de depósito:</label>
                <select id="tipo" name="tipo" required>
                    <option value="">Selecciona una opción</option>
                    <option value="efectivo">Efectivo</option>
                    <option value="transferencia">Transferencia bancaria</option>
                    <option value="tarjeta">Tarjeta de débito/crédito</option>
                </select>
            </div>

            <br>
            <button type="submit">Realizar depósito</button>
        </form>


        <br>
        <a href="menu.html">Volver al menú principal</a>
    </main>

    <!-- Pie de sitio -->
    <footer>
        <p> &copy; 2026 Alke Wallet</p>
    </footer>

    <script src="./js/jquery-4.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./js/app.js"></script>

</body>

</html>
