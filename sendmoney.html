<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/sendmoney.css">
    <title>Pantalla de envío de dinero Alke Wallet</title>
</head>

<body>
    <!-- Encabezado del sitio -->
    <header>
        <h1>Alke Wallet</h1>
    </header>

    <!-- Contenido principal -->
    <main>
        <h2>Enviar dinero</h2>
        <p>Completa los datos del destinatario y el monto a transferir:</p>
        <form>
            <div>
                <label for="destinatario">Nombre destinatario:</label>
                <input type="text" id="destinatario" name="destinatario" required>
            </div>

            <div>
                <label for="cuenta">Número de cuenta</label>
                <input type="text" id="cuenta" pattern="\d{8,}" title="Debe tener al menos 8 dígitos" required>
            </div>

            <div>
                <label for="monto">Monto:</label>
                <input type="number" id="monto" name="monto" min="1" step="1" title="El monto debe ser mayor a cero"
                    required>
            </div>

            <div>
                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@dominio.com" required>
            </div>

            <br>
            <button type="submit">Realizar transferencia</button>
        </form>

        <br>
        <a href="menu.html">Volver al menú principal</a>
    </main>

    <!-- Pie de sitio -->
    <footer>
        <p> &copy; 2026 Alke Wallet</p>
    </footer>

    <script src="./js/jquery-4.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./js/app.js"></script>

</body>

</html>
